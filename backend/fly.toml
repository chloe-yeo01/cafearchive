app = "cafearchive"
primary_region = "nrt"

[build]
  [build.args]
    requirements = "requirements.txt"

[env]
  PORT = "8000"

[[services]]
  protocol = "tcp"
  internal_port = 8000

  [[services.ports]]
    handlers = ["http"]
    port = 80

  [[services.ports]]
    handlers = ["tls", "http"]
    port = 443

[[services.http_checks]]
  interval = "15s"
  timeout = "5s"
  grace_period = "5s"
  method = "get"
  path = "/health"
  protocol = "http"